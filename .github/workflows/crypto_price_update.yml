name: 4. 암호화폐
on:
  workflow_run:
    workflows: ["3. 부동산"]
    types:
      - completed
  workflow_dispatch:

jobs:
  update-crypto:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests
      - name: Run crypto price automation
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DB_ASSET_HOLDINGS: ${{ secrets.DB_ASSET_HOLDINGS }}
          DB_EVAL_RESULT: ${{ secrets.DB_EVAL_RESULT }}
        run: python crypto_price_automation.py
