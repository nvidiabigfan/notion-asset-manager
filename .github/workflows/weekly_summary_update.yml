name: 6. 요약

on:
  # Phase 5 (crypto_price_update) 완료 후 자동 트리거
  workflow_run:
    workflows: ["Crypto Price Update"]
    types:
      - completed

  # 수동 실행용
  workflow_dispatch:

jobs:
  update-weekly-summary:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run weekly summary automation
        env:
          NOTION_TOKEN:      ${{ secrets.NOTION_TOKEN }}
          DB_EVAL_RESULT:    ${{ secrets.DB_EVAL_RESULT }}
          DB_WEEKLY_SUMMARY: ${{ secrets.DB_WEEKLY_SUMMARY }}
        run: python weekly_summary_automation.py
