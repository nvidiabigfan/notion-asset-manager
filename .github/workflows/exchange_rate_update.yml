name: 1. 환율

on:
  schedule:
    # 매주 토요일 03:00 UTC = 12:00 KST
    - cron: '0 3 * * 6'
  
  # 수동 실행 버튼 (테스트용)
  workflow_dispatch:

jobs:
  update-exchange-rate:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 저장소 체크아웃
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      # 2. Python 설치
      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 라이브러리 설치
      - name: 필수 라이브러리 설치
        run: |
          pip install requests pytz

      # 4. 환율 자동화 스크립트 실행
      - name: 환율 조회 및 노션 저장
        env:
          BOK_API_KEY: ${{ secrets.BOK_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python exchange_rate_automation.py
