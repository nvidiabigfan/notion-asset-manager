name: Pension ETF Price Update

on:
  # Phase 3 (real_estate_update) 완료 후 자동 트리거
  workflow_run:
    workflows: ["Real Estate Price Update"]
    types:
      - completed

  workflow_dispatch:

jobs:
  update-pension:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run pension ETF automation
        env:
          NOTION_TOKEN:      ${{ secrets.NOTION_TOKEN }}
          DB_ASSET_HOLDINGS: ${{ secrets.DB_ASSET_HOLDINGS }}
          DB_EVAL_RESULT:    ${{ secrets.DB_EVAL_RESULT }}
        run: python pension_etf_automation.py
